name: Release Kimi Plugins

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package plugins
        run: |
          mkdir -p dist
          for plugin in \
            plugins/vertical-plugins/financial-analysis \
            plugins/vertical-plugins/equity-research \
            plugins/agent-plugins/china-market-researcher \
            plugins/agent-plugins/china-model-builder
          do
            name=$(basename "$plugin")
            (cd "$plugin" && zip -r "../../../dist/${name}.zip" .)
          done
          ls -la dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
